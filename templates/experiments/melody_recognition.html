{% extends "base.html" %}

{% block title %}{{ experiment.title }}{% endblock %}

{% block head %}
<!-- jsPsych v7 -->
<script src="https://unpkg.com/jspsych@7.3.4/jspsych.js"></script>
<link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" />
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3/dist/index.browser.min.js"></script>
{% endblock %}

{% block content %}
<div id="jspsych-target"></div>

<script>
  const SAVE_URL = "{{ url_for('save_data') }}";
  const EXPERIMENT_ID = "{{ experiment.id }}";

  const jsPsych = initJsPsych({
    display_element: "jspsych-target",
    on_finish: function () {
      const data = jsPsych.data.get().json();
      fetch(SAVE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ experiment_id: EXPERIMENT_ID, trials: JSON.parse(data) }),
      });
    },
  });

  // ── Welcome screen ────────────────────────────────────────────────────────
  const welcome = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>Melody Recognition</h2>
      <p>You will be presented with the name of a well-known melody.</p>
      <p>Rate how familiar you are with each melody on a scale from 1 (Never heard it)
         to 5 (Know it very well).</p>
      <p><em>Press any key to begin.</em></p>
    `,
  };

  // ── Trials ─────────────────────────────────────────────────────────────────
  const melodies = [
    "Happy Birthday",
    "Twinkle Twinkle Little Star",
    "Ode to Joy",
    "Mary Had a Little Lamb",
  ];

  const likertScale = [
    "1 – Never heard it",
    "2 – Vaguely familiar",
    "3 – Somewhat familiar",
    "4 – Quite familiar",
    "5 – Know it very well",
  ];

  const trials = melodies.map(function (melody) {
    return {
      type: jsPsychSurveyLikert,
      questions: [
        {
          prompt: `How familiar are you with "<em>${melody}</em>"?`,
          labels: likertScale,
          required: true,
        },
      ],
      data: { melody: melody, task: "melody_recognition" },
    };
  });

  // ── Debrief ────────────────────────────────────────────────────────────────
  const debrief = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>Thank you!</h2>
      <p>Your responses have been recorded.</p>
      <p><em>Press any key to finish.</em></p>
    `,
  };

  jsPsych.run([welcome, ...trials, debrief]);
</script>
{% endblock %}
